name: CI

# Cloud build check — runs `next build` (which also type-checks) on GitHub's
# runners for every PR and every push to main. Lets a low-spec machine ship
# confidently without building locally: a red check = don't merge.

on:
  pull_request:
  push:
    branches: [main]

# Cancel an in-progress run when new commits are pushed to the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (Next.js)
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: '1'
      # Build-time public env. Real values are optional for a build/type check —
      # placeholders keep the build green without exposing secrets. Add repo
      # secrets with the same names to override (Settings → Secrets → Actions).
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
