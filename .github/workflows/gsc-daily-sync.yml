name: GSC Daily Sync

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync GSC data (NZ, yesterday)
        run: |
          result=$(curl -s -X POST https://www.ctstours.co.nz/api/gsc/sync \
            -H "Authorization: Bearer ${{ secrets.GSC_SYNC_SECRET }}" \
            -H "Content-Type: application/json")
          echo "$result"
          echo "$result" | grep -q '"success":true' && echo "Sync OK" || exit 1
