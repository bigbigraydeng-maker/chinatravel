name: GSC Daily Sync

on:
  schedule:
    # Every day at 9am UTC (10pm NZT) — GSC data has 2-3 day lag
    - cron: '0 9 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync yesterday's GSC data
        run: |
          curl -s -X POST https://www.ctstours.co.nz/api/gsc/sync \
            -H "Authorization: Bearer ${{ secrets.GSC_SYNC_SECRET }}" \
            -H "Content-Type: application/json" \
            | tee /dev/stderr | grep -q '"success":true'
